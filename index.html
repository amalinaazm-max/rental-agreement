<h2>Rental Avenue Leasing Agreement</h2>

<div class="card">
  <h3>🚗 Vehicle Details</h3>

  <label>Car Plate No.</label>
  <input id="carPlate">

  <label>Make / Model</label>
  <input id="model">

  <label>Chassis No.</label>
  <input id="chassis">

  <label>Engine No.</label>
  <input id="engine">

  <label>Colour</label>
  <input id="colour">
</div>

<div class="card">
  <h3>👤 Hirer's Particulars</h3>

  <label>Name</label>
  <input id="mainName">

  <label>Date of Birth</label>
  <input type="date" id="mainDob">

  <label>Address</label>
  <input id="mainAddress">

  <label>Postal Code</label>
  <input id="mainPostal">

  <label>NRIC</label>
  <input id="mainNric">

  <label>Nationality</label>
  <input id="mainNationality">

  <label>Contact Number</label>
  <input id="mainContact">

  <label>Email</label>
  <input id="mainEmail">
</div>

<div class="card">

  <label>Name</label>

  <input type="date" id="otherDob">

  <label>NRIC</label>

  <input id="otherNationality">

  <label>Contact Number</label>
  <input id="otherContact">

  <label>Email</label>
  <input id="otherEmail">
</div>


<div class="card">

  <label>Start Date</label>

  <label>End Date</label>
  <input type="date" id="endDate">

  <label>Security Deposit (SGD$)</label>

  <label>Initial Payment (SGD$)</label>

</div>
